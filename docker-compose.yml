version: '3.8'
services:
  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    ports:
      - '9092:9092'
    depends_on:
      - zookeeper

  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - '2181:2181'

  api:
    build: ./api
    ports:
      - '8000:8000'
    environment:
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP:-kafka:9092}
      - PATHWAY_HOST=${PATHWAY_HOST:-pathway:8080}
    depends_on:
      - kafka

  # Pathway is usually run as a service. Adjust according to local licensing/installation.
  # pathway:
  #   image: pathway/pathway:latest
  #   environment:
  #     - PATHWAY_LICENSE=${PATHWAY_LICENSE}
  #   ports:
  #     - '8080:8080'

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
